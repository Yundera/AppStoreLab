name: immich

services:
  immich:
    image: ghcr.io/immich-app/immich-server:v2.7.5
    container_name: immich
    user: $PUID:$PGID
    cpu_shares: 70
    volumes:
      - /DATA/AppData/immich/upload/:/data/
      # Read-only access to the gallery directory used to import media files from the host directly (Immich external library)
      - /DATA/Gallery/:/import/:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_PORT: 80
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    expose:
      - 80
    labels:
      caddy_0: immich-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: immich-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: immich-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - immich
      - pcs

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    container_name: immich_machine_learning
    cpu_shares: 5
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '0.5'
    user: 0:0  # no users volume mount so can run as root
    environment:
      TZ: $TZ
      PGID: 0
      PUID: 0
    restart: unless-stopped
    healthcheck:
      disable: false
    volumes:
      - /DATA/AppData/immich/model-cache/:/cache/
    networks:
      - immich

  redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    container_name: immich-redis
    cpu_shares: 10
    user: 0:0 # no volume mount so can run as root
    healthcheck:
      test: redis-cli ping || exit 1
    environment:
      TZ: $TZ
    restart: unless-stopped
    networks:
      - immich

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich-postgres
    cpu_shares: 10
    user: $PUID:$PGID
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: 'HDD'
      TZ: UTC
      PGID: $PGID
      PUID: $PUID
    volumes:
      - /DATA/AppData/immich/pgdata/:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready --dbname='immich' --username='postgres' || exit 1; Chksum="$$(psql --dbname='immich' --username='postgres' --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; echo "checksum failure count is $$Chksum"; [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    restart: unless-stopped
    networks:
      - immich

networks:
  immich:
    name: immich
  pcs:
    name: pcs
    external: true

x-casaos:
  main: immich
  webui_port: 80
  index: /

  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Immich/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Immich/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Immich/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Immich/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Immich/thumbnail.png

  architectures:
    - amd64
    - arm64
  store_app_id: immich
  category: Gallery
  author: Cp0204
  developer: alextran1502
  description:
    en_us: |
      Immich gives you a modern, self-hosted photo and video gallery, without the limits or tracking of traditional cloud services.

      Automatically back up your photos and videos from your phone. Organize them by date, location, or face. Browse everything from a sleek web app, stream in 4K to your smart TV, and share albums privately with family and friends : no account or app needed.

      **New in v2.x:** Optical Character Recognition (OCR) lets you search for text within your photos, supporting English, Chinese, Japanese, Korean, Russian, Greek, Thai, and Latin-script languages.

      Unlike other platforms, Immich runs on your own private server. That means:

      * **Unlimited storage** - You can upgrade the storage anytime at market price on your Yundera interface
      * **No data mining**
      * **Lightning-fast access on your local network**
      * **Multi-user support**, so everyone in your home has their own space

      Perfect for photographers, families, or anyone who wants to take back control of their memories. Immich works beautifully on your Yundera Personal Cloud Server, so your media stays **yours : forever**.
    fr_fr: |
      Immich vous offre une galerie moderne de photos et vidéos auto-hébergée, sans les limites ou le suivi des services cloud traditionnels.

      Sauvegardez automatiquement vos photos et vidéos depuis votre téléphone. Organisez-les par date, lieu ou visage. Parcourez tout depuis une application web élégante, diffusez en 4K sur votre smart TV, et partagez des albums en privé avec votre famille et vos amis : aucun compte ou application nécessaire.

      Contrairement aux autres plateformes, Immich fonctionne sur votre propre serveur privé. Cela signifie :

      * **Stockage illimité** - Vous pouvez mettre à niveau le stockage à tout moment au prix du marché sur votre interface Yundera
      * **Aucune exploitation de données**
      * **Accès ultra-rapide sur votre réseau local**
      * **Support multi-utilisateur**, pour que chacun dans votre foyer ait son propre espace

      Parfait pour les photographes, les familles, ou quiconque veut reprendre le contrôle de ses souvenirs. Immich fonctionne parfaitement sur votre serveur cloud personnel Yundera, ainsi vos médias restent **les vôtres : pour toujours**.
    ko_kr: |
      Immich는 기존 클라우드 서비스의 제한이나 추적 없이, 직접 호스팅하는 현대적인 사진·동영상 갤러리를 제공합니다.

      휴대폰에서 사진과 동영상을 자동으로 백업하세요. 날짜, 위치, 얼굴별로 정리할 수 있습니다. 세련된 웹 앱에서 모든 것을 탐색하고, 스마트 TV에서 4K로 스트리밍하며, 가족 및 친구와 비공개로 앨범을 공유하세요 — 별도의 계정이나 앱이 필요 없습니다.

      **v2.x 신기능:** 광학 문자 인식(OCR)으로 사진 속 텍스트를 검색할 수 있습니다. 영어, 중국어, 일본어, 한국어, 러시아어, 그리스어, 태국어 및 라틴 문자 언어를 지원합니다.

      다른 플랫폼과 달리 Immich는 자신의 개인 서버에서 실행됩니다. 이는 다음을 의미합니다:

      * **무제한 저장 공간** - Yundera 인터페이스에서 시장 가격으로 언제든 스토리지를 업그레이드할 수 있습니다
      * **데이터 마이닝 없음**
      * **로컬 네트워크에서 초고속 접근**
      * **다중 사용자 지원** — 가족 모두가 각자의 공간을 가질 수 있습니다

      사진작가, 가족, 또는 자신의 추억을 직접 관리하고 싶은 모든 분에게 완벽합니다. Immich는 Yundera 개인 클라우드 서버에서 완벽하게 작동하며, 여러분의 미디어는 **영원히 여러분의 것**입니다.
    zh_cn: |
      Immich 为您提供现代化的自托管照片和视频画廊，没有传统云服务的限制或追踪。

      自动从手机备份照片和视频。按日期、位置或人脸进行整理。通过精美的网页应用浏览所有内容，在智能电视上以 4K 流式播放，并与家人和朋友私密共享相册——无需账户或应用。

      **v2.x 新功能：** 光学字符识别（OCR）让您可以搜索照片中的文字，支持英语、中文、日语、韩语、俄语、希腊语、泰语和拉丁字母语言。

      与其他平台不同，Immich 运行在您自己的私人服务器上。这意味着：

      * **无限存储空间** - 您可以随时在 Yundera 界面上以市场价格升级存储
      * **无数据挖掘**
      * **本地网络闪电般快速访问**
      * **多用户支持**，让家中每个人都有自己的空间

      非常适合摄影师、家庭或任何想要掌控自己回忆的人。Immich 在您的 Yundera 个人云服务器上完美运行，您的媒体将**永远属于您**。
    es_es: |
      Immich le ofrece una galería moderna de fotos y vídeos autoalojada, sin las limitaciones ni el rastreo de los servicios en la nube tradicionales.

      Haga copias de seguridad automáticas de sus fotos y vídeos desde su teléfono. Organícelos por fecha, ubicación o rostro. Explore todo desde una elegante aplicación web, transmita en 4K a su smart TV y comparta álbumes de forma privada con familiares y amigos, sin necesidad de cuenta ni aplicación.

      **Nuevo en v2.x:** El reconocimiento óptico de caracteres (OCR) le permite buscar texto dentro de sus fotos, compatible con inglés, chino, japonés, coreano, ruso, griego, tailandés e idiomas con escritura latina.

      A diferencia de otras plataformas, Immich se ejecuta en su propio servidor privado. Esto significa:

      * **Almacenamiento ilimitado** - Puede ampliar el almacenamiento en cualquier momento a precio de mercado desde su interfaz Yundera
      * **Sin minería de datos**
      * **Acceso ultrarrápido en su red local**
      * **Soporte multiusuario**, para que cada persona en su hogar tenga su propio espacio

      Perfecto para fotógrafos, familias o cualquier persona que quiera recuperar el control de sus recuerdos. Immich funciona perfectamente en su servidor personal en la nube Yundera, para que sus medios sean **suyos para siempre**.
  tagline:
    en_us: Your Private Photo Library, Fully Under Your Control
    fr_fr: Votre bibliothèque photo privée, entièrement sous votre contrôle
    ko_kr: 완전히 내가 관리하는 나만의 사진 라이브러리
    zh_cn: 完全由您掌控的私人照片库
    es_es: Su biblioteca de fotos privada, totalmente bajo su control
  title:
    en_us: Immich
  tips:
    before_install:
      en_us: |
        **Setup Information:**

        🔐 **First Setup**:
        1. Wait 5 minutes for Immich to fully start
        2. Visit `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` and create your admin account
        3. **Always use this sslip.io URL** for unlimited uploads

        | Access Type | URL | Upload Limit |
        |-------------|-----|--------------|
        | **Recommended** | `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` | ∞ Unlimited |
        | Standard | `https://immich-$APP_DOMAIN/` | 100 MB |

        📱 **Mobile App**: Download the Immich app and connect using the sslip.io URL above for unlimited photo/video backup.

        🔍 **OCR (Text Search)**: Immich v2.x includes OCR to search text in your photos. To enable OCR for existing photos, go to Administration > Job Settings and run the OCR job.

        📁 **Import Existing Photos**: To import photos already on your PCS:
        1. Place files in `/DATA/Gallery/` using the Files app
        2. In Immich, go to **Administration → External Libraries**
        3. Create a library, add import path: `/import`
        4. Click **Scan Library**

      fr_fr: |
        **Informations de configuration :**

        🔐 **Première configuration** :
        1. Attendez 5 minutes le démarrage complet d'Immich
        2. Visitez `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` et créez votre compte admin
        3. **Utilisez toujours cette URL sslip.io** pour des uploads illimités

        | Type d'accès | URL | Limite d'upload |
        |--------------|-----|-----------------|
        | **Recommandé** | `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` | ∞ Illimité |
        | Standard | `https://immich-$APP_DOMAIN/` | 100 Mo |

        📱 **Application mobile** : Téléchargez l'app Immich et connectez-vous avec l'URL sslip.io ci-dessus pour une sauvegarde illimitée de vos photos/vidéos.

        🔍 **OCR (Recherche de texte)** : Immich v2.x inclut l'OCR pour rechercher du texte dans vos photos. Pour activer l'OCR sur les photos existantes, allez dans Administration > Job Settings et lancez le job OCR.

        📁 **Importer des photos existantes** : Pour importer des photos déjà sur votre PCS :
        1. Placez les fichiers dans `/DATA/Gallery/` via l'app Files
        2. Dans Immich, allez dans **Administration → External Libraries**
        3. Créez une bibliothèque, ajoutez le chemin : `/import`
        4. Cliquez sur **Scan Library**
      ko_kr: |
        **설정 정보:**

        🔐 **첫 설정**:
        1. Immich가 완전히 시작될 때까지 5분간 기다려주세요
        2. `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/`에 접속하여 관리자 계정을 생성하세요
        3. 무제한 업로드를 위해 **항상 이 sslip.io URL을 사용하세요**

        | 접속 방식 | URL | 업로드 제한 |
        |-----------|-----|-------------|
        | **권장** | `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` | ∞ 무제한 |
        | 표준 | `https://immich-$APP_DOMAIN/` | 100 MB |

        📱 **모바일 앱**: Immich 앱을 다운로드하고 위의 sslip.io URL로 연결하면 사진/동영상을 무제한으로 백업할 수 있습니다.

        🔍 **OCR (텍스트 검색)**: Immich v2.x에는 사진 속 텍스트를 검색할 수 있는 OCR 기능이 포함되어 있습니다. 기존 사진에 OCR을 활성화하려면 관리자 > Job Settings에서 OCR 작업을 실행하세요.

        📁 **기존 사진 가져오기**: PCS에 이미 있는 사진을 가져오려면:
        1. Files 앱을 사용하여 `/DATA/Gallery/`에 파일을 넣으세요
        2. Immich에서 **Administration → External Libraries**로 이동하세요
        3. 라이브러리를 생성하고 가져오기 경로 `/import`를 추가하세요
        4. **Scan Library**를 클릭하세요
      zh_cn: |
        **设置信息：**

        🔐 **首次设置**：
        1. 请等待 5 分钟，让 Immich 完全启动
        2. 访问 `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` 并创建管理员账户
        3. **请始终使用此 sslip.io URL** 以获得无限上传

        | 访问方式 | URL | 上传限制 |
        |----------|-----|----------|
        | **推荐** | `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` | ∞ 无限制 |
        | 标准 | `https://immich-$APP_DOMAIN/` | 100 MB |

        📱 **移动应用**：下载 Immich 应用，使用上方的 sslip.io URL 连接，即可无限备份照片/视频。

        🔍 **OCR（文字搜索）**：Immich v2.x 包含 OCR 功能，可搜索照片中的文字。要为现有照片启用 OCR，请前往 Administration > Job Settings 并运行 OCR 任务。

        📁 **导入现有照片**：要导入 PCS 上已有的照片：
        1. 使用 Files 应用将文件放入 `/DATA/Gallery/`
        2. 在 Immich 中，前往 **Administration → External Libraries**
        3. 创建库，添加导入路径：`/import`
        4. 点击 **Scan Library**
      es_es: |
        **Información de configuración:**

        🔐 **Primera configuración**:
        1. Espere 5 minutos a que Immich se inicie completamente
        2. Visite `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` y cree su cuenta de administrador
        3. **Use siempre esta URL sslip.io** para subidas ilimitadas

        | Tipo de acceso | URL | Límite de subida |
        |----------------|-----|------------------|
        | **Recomendado** | `https://immich-$APP_PUBLIC_IP_DASH.sslip.io/` | ∞ Ilimitado |
        | Estándar | `https://immich-$APP_DOMAIN/` | 100 MB |

        📱 **Aplicación móvil**: Descargue la app Immich y conéctese usando la URL sslip.io anterior para una copia de seguridad ilimitada de fotos/vídeos.

        🔍 **OCR (Búsqueda de texto)**: Immich v2.x incluye OCR para buscar texto en sus fotos. Para activar OCR en las fotos existentes, vaya a Administration > Job Settings y ejecute la tarea OCR.

        📁 **Importar fotos existentes**: Para importar fotos que ya están en su PCS:
        1. Coloque los archivos en `/DATA/Gallery/` usando la app Files
        2. En Immich, vaya a **Administration → External Libraries**
        3. Cree una biblioteca, añada la ruta de importación: `/import`
        4. Haga clic en **Scan Library**