  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/n8n/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/n8n/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/n8n/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/n8n/thumbnail.png
  tagline:
    en_us: n8n optimized for automated bot workflows
    ko_kr: 봇 자동화 워크플로우에 최적화된 n8n
  title:
    en_us: n8n Bot
  tips:
    before_install:
      en_us: |
        **Prerequisites:**
        Install these apps first:
        1. **Browser MCP Bot** - Headless browser for web automation
        2. **Beacon** - Claude AI for content generation

        **Setup Steps:**
        1. Create your n8n owner account on first launch
        2. Generate an API key: Settings > API > Create API Key
        3. Import the workflow JSON files (main, cookie register, cookie test)
        4. Log into each Reddit account in Browser MCP Bot and run "Manual Save Cookies"
        5. Activate the main workflow

        **Environment:**
        This instance has `fs` and `path` modules enabled for cookie/state file management.
      ko_kr: |
        **사전 준비:**
        먼저 이 앱들을 설치하세요:
        1. **Browser MCP Bot** - 웹 자동화를 위한 헤드리스 브라우저
        2. **Beacon** - 콘텐츠 생성을 위한 Claude AI

        **설정 단계:**
        1. 첫 실행 시 n8n 관리자 계정 생성
        2. API 키 생성: Settings > API > Create API Key
        3. 워크플로우 JSON 파일 import (메인, 쿠키 등록, 쿠키 테스트)
        4. Browser MCP Bot에서 각 Reddit 계정 로그인 후 "Manual Save Cookies" 실행
        5. 메인 워크플로우 활성화

        **환경:**
        쿠키/상태 파일 관리를 위해 `fs`, `path` 모듈이 활성화되어 있습니다.
  index: /
