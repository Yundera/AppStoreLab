name: jellyfin

services:
  jellyfin-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: jellyfin-proxy
    restart: unless-stopped
    expose:
      - 80
    labels:
      caddy_0: jellyfin-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: jellyfin-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: jellyfin-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    user: "0:0"
    cpu_shares: 80
    environment:
      BACKEND_HOST: jellyfin
      BACKEND_PORT: "8096"
      LISTEN_PORT: "80"
      AUTH_DISABLED: "true"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - jellyfin
    networks:
      - pcs

  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    volumes:
      - /DATA/AppData/jellyfin/config/:/config
      - /DATA/AppData/jellyfin/cache/:/cache
      - /DATA/Media/Movies/:/media/movies
      - /DATA/Media/TV Shows/:/media/tvshows
      - /DATA/Media/Music/:/media/music
      - /DATA/Downloads/:/media/downloads
    user: $PUID:$PGID
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    cpu_shares: 50
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

