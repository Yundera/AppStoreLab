name: browsermcp
services:
  # Main container — Chromium + Playwright + MCP server + noVNC viewer.
  # Reachable at browsermcp:9746 on the pcs network. Beacon discovery on UDP 9099.
  browsermcp:
    image: ghcr.io/worph/browser-mcp:1.1.3
    container_name: browsermcp
    hostname: browsermcp
    restart: unless-stopped
    # Chromium needs a large /dev/shm or it crashes rendering big pages.
    shm_size: "2gb"
    # supervisord is PID 1 and MUST start as root so it can spawn Xvfb/x11vnc and
    # drop privileges for its children. A non-root uid fails to manage the display.
    user: "0:0"
    expose:
      - 9746
      - 9099
    environment:
      - TZ=$TZ
      - PORT=9746
      - DISCOVERY_PORT=9099
      - CONFIG_PATH=/app/data/config.json
      - VNC_RESOLUTION=1280x720x24
      # Kill idle Chrome after this many ms (default 2h); respawns on next use.
      - IDLE_TTL_MS=7200000
    volumes:
      - type: bind
        source: /DATA/AppData/browser-mcp/
        target: /app/data
    networks:
      - pcs
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # Nginx-hash-lock provides perimeter authentication for the web UI.
  # The app itself trusts the network (auth is delegated to this sidecar), so the
  # browsermcp container is never exposed directly — only this proxy gets caddy labels.
  browsermcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: browsermcp-proxy
    restart: unless-stopped
    user: "0:0"
    expose:
      - 80
    environment:
      # /mcp is reachable with just the hash (AI clients); everything else
      # (web UI, noVNC, /api) sits behind the ADMIN basic-auth prompt.
      ALLOWED_PATHS: "mcp"
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: browsermcp
      BACKEND_PORT: "9746"
      LISTEN_PORT: "80"
      USER: "ADMIN"
      PASSWORD: $APP_DEFAULT_PASSWORD
    depends_on:
      - browsermcp
    networks:
      - pcs
    labels:
      caddy_0: browsermcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: browsermcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: browsermcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
  main: browsermcp
  index: /?hash=$AUTH_HASH
  author: Yundera
  developer: Worph
  category: Developer
  description:
    en_us: |
      **A headless Chromium browser in the cloud, controlled by AI via MCP**

      Browser MCP bundles a full Chromium browser, Playwright automation, and an MCP (Model Context Protocol) server in a single container. It lets LLMs and AI assistants navigate websites, click elements, fill forms, take screenshots, and extract content programmatically.

      **What you can do:**
      - Control a real Chromium browser from any MCP-compatible AI assistant
      - Navigate websites, click elements, fill forms, and interact with web pages
      - Take screenshots for visual feedback loops (screenshot → decide → act)
      - Execute JavaScript in the browser context for advanced automation
      - View the browser live via the built-in noVNC web viewer
      - Access the Web UI dashboard for status monitoring

      **Think of it like:** A web browser in the cloud that AI can see and control.

      **Perfect if you:** Want to automate web browsing, scrape websites, test web apps, or give your AI assistant the ability to interact with any website.
    fr_fr: |
      **Un navigateur Chromium headless dans le cloud, controle par l'IA via MCP**

      Browser MCP regroupe un navigateur Chromium complet, l'automatisation Playwright et un serveur MCP (Model Context Protocol) dans un seul conteneur. Il permet aux LLMs et assistants IA de naviguer sur les sites web, cliquer sur des elements, remplir des formulaires, prendre des captures d'ecran et extraire du contenu par programmation.

      **Ce que vous pouvez faire:**
      - Controler un vrai navigateur Chromium depuis tout assistant IA compatible MCP
      - Naviguer sur les sites, cliquer, remplir des formulaires et interagir avec les pages
      - Prendre des captures d'ecran pour des boucles de retour visuel (capture → decision → action)
      - Executer du JavaScript dans le contexte du navigateur pour une automatisation avancee
      - Visualiser le navigateur en direct via le viewer web noVNC integre
      - Acceder au tableau de bord Web UI pour le suivi de l'etat
    zh_cn: |
      **云端无头 Chromium 浏览器，通过 MCP 由 AI 控制**

      Browser MCP 将完整的 Chromium 浏览器、Playwright 自动化和 MCP（模型上下文协议）服务器整合在一个容器中。它允许 LLM 和 AI 助手浏览网站、点击元素、填写表单、截屏并以编程方式提取内容。

      **功能：**
      - 从任何兼容 MCP 的 AI 助手控制真实的 Chromium 浏览器
      - 浏览网站、点击元素、填写表单、与网页交互
      - 截取屏幕截图用于视觉反馈循环（截图 → 决策 → 操作）
      - 在浏览器上下文中执行 JavaScript 进行高级自动化
      - 通过内置 noVNC 网页查看器实时查看浏览器
      - 访问 Web UI 仪表板进行状态监控
