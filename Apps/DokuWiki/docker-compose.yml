name: dokuwiki

services:
  dokuwiki:
    image: dokuwiki/dokuwiki:stable
    container_name: dokuwiki
    restart: unless-stopped
    user: "0:0"
    networks:
      - pcs
    expose:
      - "8080"
    labels:
      caddy_0: dokuwiki-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8080}}"
      caddy_1: dokuwiki-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 8080}}"
      caddy_2: dokuwiki-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 8080}}"
    volumes:
      - /DATA/AppData/$AppID/storage:/storage
    environment:
      PHP_TIMEZONE: ${TZ:-UTC}
      PHP_MEMORYLIMIT: 256M
      PHP_UPLOADLIMIT: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail-with-body http://localhost:8080/health.php || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    cpu_shares: 50

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Yundera Team
  category: Wiki
  developer: DokuWiki Community
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/DokuWiki/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/DokuWiki/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/DokuWiki/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/DokuWiki/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/DokuWiki/thumbnail.png
  index: /
  tagline:
    en_us: Simple wiki that doesn't require a database
    ko_kr: 데이터베이스가 필요 없는 간단한 위키
    zh_cn: 不需要数据库的简单维基
    fr_fr: Wiki simple qui ne necessite pas de base de donnees
    es_es: Wiki simple que no requiere base de datos
  title:
    en_us: DokuWiki
  store_app_id: dokuwiki
  main: dokuwiki
  webui_port: 8080
  description:
    en_us: |
      **A simple, versatile wiki that needs no database**

      DokuWiki is a standards-compliant, easy to use wiki optimized for creating documentation. It stores all data in plain text files, so no database is required. Its clean and readable syntax makes it a favorite among administrators and developers.

      **What you can do:**
      - Create and organize documentation with simple wiki syntax
      - Manage access with built-in ACL (Access Control Lists)
      - Extend functionality with hundreds of community plugins
      - Customize appearance with themes and templates
      - Track all changes with full revision history
      - Search across all your wiki pages instantly

      **Perfect for:** Teams needing internal documentation, project wikis, knowledge bases, personal note-taking, and anyone who wants a lightweight wiki without database complexity.
    ko_kr: |
      **데이터베이스가 필요 없는 간단하고 다재다능한 위키**

      DokuWiki는 문서 작성에 최적화된 표준 호환, 사용하기 쉬운 위키입니다. 모든 데이터를 일반 텍스트 파일로 저장하므로 데이터베이스가 필요 없습니다. 깔끔하고 읽기 쉬운 문법으로 관리자와 개발자들에게 인기가 많습니다.

      **할 수 있는 것:**
      - 간단한 위키 문법으로 문서 작성 및 정리
      - 내장 ACL(접근 제어 목록)로 접근 관리
      - 수백 개의 커뮤니티 플러그인으로 기능 확장
      - 테마와 템플릿으로 외관 커스터마이즈
      - 전체 수정 이력으로 모든 변경사항 추적
      - 모든 위키 페이지를 즉시 검색

      **이런 분께 완벽해요:** 내부 문서가 필요한 팀, 프로젝트 위키, 지식 베이스, 개인 메모, 데이터베이스 복잡성 없이 가벼운 위키를 원하는 모든 분.
    zh_cn: |
      **不需要数据库的简单多功能维基**

      DokuWiki 是一个符合标准、易于使用的维基，专为创建文档而优化。它将所有数据存储在纯文本文件中，因此不需要数据库。其简洁可读的语法使其成为管理员和开发者的最爱。

      **您可以做的事:**
      - 使用简单的维基语法创建和组织文档
      - 使用内置 ACL（访问控制列表）管理访问权限
      - 使用数百个社区插件扩展功能
      - 使用主题和模板自定义外观
      - 通过完整修订历史跟踪所有更改
      - 即时搜索所有维基页面

      **完美适合:** 需要内部文档的团队、项目维基、知识库、个人笔记，以及任何想要轻量级维基而不需要数据库复杂性的人。
    fr_fr: |
      **Un wiki simple et polyvalent qui ne necessite pas de base de donnees**

      DokuWiki est un wiki conforme aux standards, facile a utiliser, optimise pour la creation de documentation. Il stocke toutes les donnees dans des fichiers texte brut, donc aucune base de donnees n'est requise. Sa syntaxe propre et lisible en fait un favori parmi les administrateurs et developpeurs.

      **Ce que vous pouvez faire:**
      - Creer et organiser la documentation avec une syntaxe wiki simple
      - Gerer l'acces avec les ACL integrees (listes de controle d'acces)
      - Etendre les fonctionnalites avec des centaines de plugins communautaires
      - Personnaliser l'apparence avec des themes et modeles
      - Suivre tous les changements avec l'historique complet des revisions
      - Rechercher instantanement dans toutes vos pages wiki

      **Parfait pour:** Les equipes ayant besoin de documentation interne, wikis de projets, bases de connaissances, prise de notes personnelles et toute personne souhaitant un wiki leger sans la complexite d'une base de donnees.
    es_es: |
      **Un wiki simple y versatil que no necesita base de datos**

      DokuWiki es un wiki compatible con estandares, facil de usar, optimizado para crear documentacion. Almacena todos los datos en archivos de texto plano, por lo que no se requiere base de datos. Su sintaxis limpia y legible lo convierte en favorito entre administradores y desarrolladores.

      **Lo que puedes hacer:**
      - Crear y organizar documentacion con sintaxis wiki simple
      - Gestionar acceso con ACL integradas (listas de control de acceso)
      - Extender funcionalidad con cientos de plugins de la comunidad
      - Personalizar apariencia con temas y plantillas
      - Rastrear todos los cambios con historial completo de revisiones
      - Buscar instantaneamente en todas tus paginas wiki

      **Perfecto para:** Equipos que necesitan documentacion interna, wikis de proyectos, bases de conocimiento, toma de notas personal y cualquiera que quiera un wiki ligero sin la complejidad de una base de datos.
  tips:
    before_install:
      en_us: |
        **Quick Setup:**
        1. Open the app after installation
        2. Navigate to the install page (install.php)
        3. Set your wiki name, superuser account, and password
        4. Choose your ACL policy
        5. Done! Start creating wiki pages

        **First things to do:**
        - Create your first wiki page
        - Set up user accounts and permissions
        - Install useful plugins from the Plugin Manager
        - Choose a template/theme you like

        No database setup needed - DokuWiki uses plain text files.
      ko_kr: |
        **빠른 설정:**
        1. 설치 후 앱 열기
        2. 설치 페이지(install.php)로 이동
        3. 위키 이름, 관리자 계정, 비밀번호 설정
        4. ACL 정책 선택
        5. 완료! 위키 페이지 만들기 시작

        **처음 할 일:**
        - 첫 위키 페이지 만들기
        - 사용자 계정과 권한 설정
        - 플러그인 매니저에서 유용한 플러그인 설치
        - 마음에 드는 템플릿/테마 선택

        데이터베이스 설정 불필요 - DokuWiki는 일반 텍스트 파일을 사용합니다.
      zh_cn: |
        **快速设置：**
        1. 安装后打开应用
        2. 导航到安装页面 (install.php)
        3. 设置维基名称、超级用户账户和密码
        4. 选择 ACL 策略
        5. 完成！开始创建维基页面

        **首先要做的事：**
        - 创建您的第一个维基页面
        - 设置用户账户和权限
        - 从插件管理器安装有用的插件
        - 选择您喜欢的模板/主题

        无需数据库设置 - DokuWiki 使用纯文本文件。
      fr_fr: |
        **Configuration rapide:**
        1. Ouvrez l'app apres l'installation
        2. Naviguez vers la page d'installation (install.php)
        3. Definissez le nom du wiki, le compte super-utilisateur et le mot de passe
        4. Choisissez votre politique ACL
        5. Termine! Commencez a creer des pages wiki

        **Premieres choses a faire:**
        - Creer votre premiere page wiki
        - Configurer les comptes utilisateurs et les permissions
        - Installer des plugins utiles depuis le gestionnaire de plugins
        - Choisir un modele/theme que vous aimez

        Aucune configuration de base de donnees necessaire - DokuWiki utilise des fichiers texte brut.
      es_es: |
        **Configuracion rapida:**
        1. Abre la app despues de la instalacion
        2. Navega a la pagina de instalacion (install.php)
        3. Configura el nombre del wiki, cuenta de superusuario y contrasena
        4. Elige tu politica ACL
        5. Listo! Empieza a crear paginas wiki

        **Primeras cosas por hacer:**
        - Crear tu primera pagina wiki
        - Configurar cuentas de usuario y permisos
        - Instalar plugins utiles desde el gestor de plugins
        - Elegir una plantilla/tema que te guste

        No se necesita configuracion de base de datos - DokuWiki usa archivos de texto plano.
