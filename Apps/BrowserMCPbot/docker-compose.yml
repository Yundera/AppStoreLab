name: browsermcpbot
services:
  # Single container — Chromium + MCP server for bot automation
  browsermcpbot:
    image: ghcr.io/worph/browser-mcp:1.1.2
    container_name: browsermcpbot
    hostname: browsermcpbot
    restart: unless-stopped
    shm_size: "2gb"
    user: 0:0
    expose:
      - 9746
    environment:
      - AUTH_HASH=$AUTH_HASH
      - TZ=Asia/Seoul
      - PROXY_URL=$PROXY_URL
      - VNC_RESOLUTION=1920x1080x24
    volumes:
      - type: bind
        source: /DATA/AppData/browser-mcp/
        target: /app/data
    networks:
      - pcs
    labels:
      caddy_0: browsermcpbot-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 9746}}"
      caddy_1: browsermcpbot-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 9746}}"
      caddy_2: browsermcpbot-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 9746}}"

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
  main: browsermcpbot
  author: Yundera Team
  category: Automation
  store_app_id: browsermcpbot
  description:
    en_us: |
      **A headless Chromium browser for n8n bot automation via MCP**

      Browser MCP Bot provides a dedicated Chromium browser instance designed to work with n8n Bot for automated web interactions. It handles cookie-based account switching, page navigation, form filling, and content extraction — all controlled programmatically via the MCP protocol.

      **Designed for:**
      - Automated social media posting and commenting bots
      - Cookie-based multi-account session management
      - Scheduled web interactions triggered by n8n workflows
      - Content scraping and monitoring automation

      **Requires:** n8n Bot (installed separately) to control the browser via MCP.
    ko_kr: |
      **n8n 봇 자동화를 위한 헤드리스 Chromium 브라우저**

      Browser MCP Bot은 n8n Bot과 함께 사용하도록 설계된 전용 Chromium 브라우저입니다. 쿠키 기반 계정 전환, 페이지 탐색, 폼 입력, 콘텐츠 추출을 MCP 프로토콜을 통해 프로그래밍 방식으로 처리합니다.

      **용도:**
      - 소셜 미디어 자동 포스팅/댓글 봇
      - 쿠키 기반 멀티 계정 세션 관리
      - n8n 워크플로우에서 트리거하는 예약 웹 인터랙션
      - 콘텐츠 스크래핑 및 모니터링 자동화

      **필수:** n8n Bot (별도 설치)이 MCP를 통해 브라우저를 제어합니다.
  developer: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/browsermcp/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/browsermcp/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/browsermcp/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/browsermcp/screenshot-3.png
  tagline:
    en_us: Headless browser for n8n bot automation
    ko_kr: n8n 봇 자동화를 위한 헤드리스 브라우저
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/browsermcp/thumbnail.png
  title:
    en_us: Browser MCP Bot
  index: /?hash=$AUTH_HASH
  chips:
    - key: mcp
      name:
        en_us: MCP
  tips:
    before_install:
      en_us: |
        **Getting Started**

        After installation, Chromium will launch automatically inside a virtual display.

        **Web Interface:**
        - **Main UI** — Dashboard with live noVNC browser view, status, and tool information

        **MCP Integration (for AI/LLMs):**

        Connect your AI assistant to control the browser.

        **Option 1: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "browser-mcp": {
              "type": "http",
              "url": "https://browser-mcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**
        ```json
        {
          "mcpServers": {
            "browser-mcp": {
              "type": "http",
              "url": "http://browser-mcp:9746/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Available MCP Tools:**
        | Tool | Description |
        |------|-------------|
        | `navigate` | Navigate the browser to a URL |
        | `click` | Click on an element by CSS/text selector |
        | `type` | Type text into an input element |
        | `screenshot` | Take a screenshot of the current page |
        | `evaluate` | Execute JavaScript in the browser context |
        | `get_text` | Get the text content of an element |
        | `get_page_content` | Get the full HTML of the current page |
        | `wait_for` | Wait for an element to reach a specific state |
        | `go_back` | Navigate back in browser history |
        | `go_forward` | Navigate forward in browser history |
        | `set_viewport` | Set the browser viewport size |
        | `get_console_logs` | Get browser console log entries |
        | `pdf` | Generate a PDF of the current page |
        | `get_cookies` | Get browser cookies |
        | `set_cookies` | Set browser cookies |
        | `clear_cookies` | Clear all browser cookies |
      zh_cn: |
        **快速开始**

        安装后，Chromium 将在虚拟显示中自动启动。

        **Web 界面：**
        - **主 UI** — 带有实时 noVNC 浏览器视图、状态和工具信息的仪表板

        **MCP 集成（用于 AI/LLM）：**

        连接您的 AI 助手来控制浏览器。

        **选项 1：公共 URL（使用 hash 认证）**
        ```json
        {
          "mcpServers": {
            "browser-mcp": {
              "type": "http",
              "url": "https://browser-mcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **选项 2：本地 Docker 连接（无需认证）**
        ```json
        {
          "mcpServers": {
            "browser-mcp": {
              "type": "http",
              "url": "http://browser-mcp:9746/mcp"
            }
          }
        }
        ```
        *注意：需要 AI 助手在 `pcs` Docker 网络上。*

        **可用 MCP 工具：**
        | 工具 | 描述 |
        |------|------|
        | `navigate` | 将浏览器导航到 URL |
        | `click` | 通过 CSS/文本选择器点击元素 |
        | `type` | 在输入元素中输入文本 |
        | `screenshot` | 截取当前页面截图 |
        | `evaluate` | 在浏览器上下文中执行 JavaScript |
        | `get_text` | 获取元素的文本内容 |
        | `get_page_content` | 获取当前页面的完整 HTML |
        | `wait_for` | 等待元素达到特定状态 |
        | `go_back` | 在浏览器历史中后退 |
        | `go_forward` | 在浏览器历史中前进 |
        | `set_viewport` | 设置浏览器视口大小 |
        | `get_console_logs` | 获取浏览器控制台日志 |
        | `pdf` | 生成当前页面的 PDF |
        | `get_cookies` | 获取浏览器 cookies |
        | `set_cookies` | 设置浏览器 cookies |
        | `clear_cookies` | 清除所有浏览器 cookies |
